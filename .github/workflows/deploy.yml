name: Deploy to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t todo-app .

      - name: Deploy to AWS EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd /home/ubuntu/to-do-devops-app
            git pull origin main
            sudo docker stop todo-container || true
            sudo docker rm todo-container || true
            sudo docker build -t todo-app .
            sudo docker run -d -p 80:5000 --restart unless-stopped --name todo-container todo-app